<button #originRef
        (click)="showPopover()"
        [class.active]="dropdownOpen"
        class="notif-btn"
        mat-icon-button
        type="button"
        matTooltip="Notifications">
  <mat-icon svgIcon="mat:notifications_none"></mat-icon>
  <span *ngIf="unreadCount > 0" class="notif-badge">{{ unreadCount > 9 ? '9+' : unreadCount }}</span>
</button>
