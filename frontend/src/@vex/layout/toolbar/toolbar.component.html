<div class="toolbar w-full flex items-center">

  <!-- Hamburger (always visible — toggles sidenav) -->
  <button (click)="openSidenav()" mat-icon-button type="button" class="toolbar__hamburger">
    <mat-icon svgIcon="mat:menu"></mat-icon>
  </button>

  <!-- Center: wide search bar -->
  <div class="toolbar__search-wrap">
    <button class="toolbar__search-bar" (click)="openSearch()" type="button">
      <mat-icon class="toolbar__search-icon" svgIcon="mat:search"></mat-icon>
      <span class="toolbar__search-placeholder">Search</span>
    </button>
  </div>

  <!-- Right: help only -->
  <button mat-icon-button
          type="button"
          matTooltip="Help & getting started"
          class="toolbar__help-btn">
    <mat-icon svgIcon="mat:help_outline"></mat-icon>
  </button>

</div>
