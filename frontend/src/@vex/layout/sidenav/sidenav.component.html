<div class="asn-sidenav"
     [class.collapsed]="collapsed"
     [class.open]="collapsed && (collapsedOpen$ | async)"
     (mouseenter)="collapseOpenSidenav()"
     (mouseleave)="collapseCloseSidenav()">

  <!-- ── Workspace header ───────────────────────────── -->
  <div class="asn-workspace">
    <div class="asn-workspace__logo-wrap">
      <img [src]="imageUrl$ | async" alt="Logo" class="asn-workspace__logo" />
    </div>
    <span class="asn-workspace__name">{{ title$ | async }}</span>
    <button *ngIf="showCollapsePin$ | async"
            class="asn-collapse-btn"
            (click)="toggleCollapse()"
            mat-icon-button
            type="button">
      <mat-icon *ngIf="!collapsed" class="icon-xs" svgIcon="mat:radio_button_checked"></mat-icon>
      <mat-icon *ngIf="collapsed"  class="icon-xs" svgIcon="mat:radio_button_unchecked"></mat-icon>
    </button>
  </div>

  <!-- ── Quick search ───────────────────────────────── -->
  <div class="asn-search" (click)="openSearch()" matRipple matRippleColor="var(--sidenav-item-ripple-color)">
    <mat-icon svgIcon="mat:search" class="asn-search__icon"></mat-icon>
    <span class="asn-search__placeholder">Search…</span>
    <kbd class="asn-search__kbd">⌘K</kbd>
  </div>

  <!-- ── Scrollable nav ─────────────────────────────── -->
  <vex-scrollbar class="asn-scroll">

    <!-- Primary nav -->
    <nav class="asn-nav">
      <a class="asn-item"
         routerLink="/dashboard"
         routerLinkActive="asn-item--active"
         [routerLinkActiveOptions]="{ exact: true }"
         matRipple matRippleColor="var(--sidenav-item-ripple-color)"
         [matTooltip]="collapsed ? 'Home' : ''" matTooltipPosition="right">
        <mat-icon svgIcon="mat:home" class="asn-item__icon"></mat-icon>
        <span class="asn-item__label">Home</span>
      </a>

      <a class="asn-item"
         routerLink="/inbox"
         routerLinkActive="asn-item--active"
         matRipple matRippleColor="var(--sidenav-item-ripple-color)"
         [matTooltip]="collapsed ? 'Inbox' : ''" matTooltipPosition="right">
        <mat-icon svgIcon="mat:inbox" class="asn-item__icon"></mat-icon>
        <span class="asn-item__label">Inbox</span>
        <span class="asn-item__badge">3</span>
      </a>

      <a class="asn-item"
         routerLink="/my-tasks"
         routerLinkActive="asn-item--active"
         matRipple matRippleColor="var(--sidenav-item-ripple-color)"
         [matTooltip]="collapsed ? 'My Tasks' : ''" matTooltipPosition="right">
        <mat-icon svgIcon="mat:check_circle_outline" class="asn-item__icon"></mat-icon>
        <span class="asn-item__label">My Tasks</span>
      </a>
    </nav>

    <!-- Divider -->
    <div class="asn-divider"></div>

    <!-- Work section -->
    <div class="asn-section-group">
      <a class="asn-item"
         routerLink="/projects"
         routerLinkActive="asn-item--active"
         matRipple matRippleColor="var(--sidenav-item-ripple-color)"
         [matTooltip]="collapsed ? 'Projects' : ''" matTooltipPosition="right">
        <mat-icon svgIcon="mat:folder_open" class="asn-item__icon"></mat-icon>
        <span class="asn-item__label">Projects</span>
      </a>

      <a class="asn-item"
         routerLink="/portfolios"
         routerLinkActive="asn-item--active"
         matRipple matRippleColor="var(--sidenav-item-ripple-color)"
         [matTooltip]="collapsed ? 'Portfolios' : ''" matTooltipPosition="right">
        <mat-icon svgIcon="mat:assessment" class="asn-item__icon"></mat-icon>
        <span class="asn-item__label">Portfolios</span>
      </a>
    </div>

    <!-- Divider -->
    <div class="asn-divider"></div>

    <!-- My Projects collapsible list -->
    <div class="asn-section-group">
      <div class="asn-section-header" (click)="projectsOpen = !projectsOpen">
        <mat-icon class="asn-section-header__chevron"
                  [class.open]="projectsOpen"
                  svgIcon="mat:chevron_right"></mat-icon>
        <span class="asn-section-header__label">My Projects</span>
      </div>

      <ng-container *ngIf="projectsOpen">
        <a *ngFor="let project of projects$ | async"
           class="asn-item asn-item--project"
           [routerLink]="['/projects', project.id, 'list']"
           routerLinkActive="asn-item--active"
           matRipple matRippleColor="var(--sidenav-item-ripple-color)"
           [matTooltip]="collapsed ? project.name : ''" matTooltipPosition="right">
          <span class="asn-project-dot" [style.background]="project.color"></span>
          <span class="asn-item__label">{{ project.name }}</span>
        </a>
      </ng-container>
    </div>

  </vex-scrollbar>

  <!-- ── Footer / User ─────────────────────────────── -->
  <div class="asn-footer">
    <div class="asn-footer__user"
         #userProfileMenuOriginRef
         (click)="openProfileMenu(userProfileMenuOriginRef)"
         [class.asn-footer__user--open]="userMenuOpen$ | async"
         matRipple
         matRippleColor="var(--sidenav-item-ripple-color)">
      <img class="asn-footer__avatar" src="assets/img/demo/1.jpg" alt="User avatar" />
      <div class="asn-footer__user-info">
        <div class="asn-footer__user-name">David Smith</div>
        <div class="asn-footer__user-role">Product Manager</div>
      </div>
      <mat-icon class="asn-footer__dropdown-icon" svgIcon="mat:expand_more"></mat-icon>
    </div>
  </div>

</div>
