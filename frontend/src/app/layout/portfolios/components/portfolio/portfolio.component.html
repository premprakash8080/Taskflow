<div class="pf" *ngIf="portfolio; else loading">
  <vex-portfolio-header [portfolio]="portfolio"></vex-portfolio-header>
  <div class="pf__content">
    <router-outlet></router-outlet>
  </div>
</div>

<ng-template #loading>
  <div class="pf__loading">
    <mat-icon svgIcon="mat:assessment"></mat-icon>
    <span>Loading portfolio…</span>
  </div>
</ng-template>
