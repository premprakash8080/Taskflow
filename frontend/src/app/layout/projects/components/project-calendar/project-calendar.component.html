<div class="cal">

  <!-- ── Header: month nav ────────────────────────────────────────────────── -->
  <div class="cal__header">
    <div class="cal__header-left">
      <h2 class="cal__month-label">{{ monthLabel }}</h2>
    </div>
    <div class="cal__header-right">
      <button mat-button class="cal__today-btn"
              [disabled]="isCurrentMonth"
              (click)="goToToday()">
        Today
      </button>
      <button mat-icon-button class="cal__nav-btn" (click)="prevMonth()" matTooltip="Previous month">
        <mat-icon svgIcon="mat:chevron_left"></mat-icon>
      </button>
      <button mat-icon-button class="cal__nav-btn" (click)="nextMonth()" matTooltip="Next month">
        <mat-icon svgIcon="mat:chevron_right"></mat-icon>
      </button>
    </div>
  </div>

  <!-- ── Weekday labels ────────────────────────────────────────────────────── -->
  <div class="cal__weekdays">
    <div class="cal__weekday" *ngFor="let d of weekdays">{{ d }}</div>
  </div>

  <!-- ── Calendar grid ────────────────────────────────────────────────────── -->
  <div class="cal__grid">
    <div class="cal__week" *ngFor="let week of weeks">
      <div class="cal__day"
           *ngFor="let day of week.days; trackBy: trackByDate"
           [class.cal__day--today]="day.isToday"
           [class.cal__day--other-month]="!day.isCurrentMonth"
           [class.cal__day--empty]="!day.date">

        <!-- Day number -->
        <div class="cal__day-num" *ngIf="day.date">
          <span [class.cal__day-num--today]="day.isToday">{{ day.date.getDate() }}</span>
        </div>

        <!-- Task chips -->
        <div class="cal__tasks" *ngIf="day.date && day.tasks.length > 0">
          <ng-container *ngFor="let task of day.tasks; let i = index">
            <!-- Show first 3, then a "+N more" chip -->
            <div class="cal__task-chip"
                 *ngIf="i < 3"
                 [class.cal__task-chip--done]="task.completed"
                 [style.background]="taskColor(task) + '22'"
                 [style.border-left-color]="taskColor(task)"
                 [matTooltip]="task.name"
                 matTooltipPosition="above"
                 (click)="selectTask(task, $event)">
              <span class="cal__task-chip-name">{{ task.name }}</span>
            </div>

            <div class="cal__task-more"
                 *ngIf="i === 3"
                 [style.color]="taskColor(task)">
              +{{ day.tasks.length - 3 }} more
            </div>
          </ng-container>
        </div>

      </div>
    </div>
  </div>

  <!-- ── Legend ────────────────────────────────────────────────────────────── -->
  <div class="cal__legend">
    <span class="cal__legend-item">
      <span class="cal__legend-dot cal__legend-dot--today"></span>
      Today
    </span>
    <span class="cal__legend-item">
      <span class="cal__legend-bar" [style.background]="project?.color ?? '#6366f1'"></span>
      Tasks due
    </span>
  </div>

</div>
