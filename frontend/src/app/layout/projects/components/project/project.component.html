<ng-container *ngIf="project; else notFound">

  <div class="pw">

    <!-- ── Project header (tabs + title) ─────────────────────────── -->
    <vex-project-header [project]="project"></vex-project-header>

    <!-- ── Main split: view + optional detail panel ───────────────── -->
    <div class="pw__body">

      <!-- Active view (list / board / timeline / …) -->
      <div class="pw__view" [class.pw__view--narrowed]="!!selectedTask">
        <router-outlet></router-outlet>
      </div>

      <!-- Task detail panel — flex sibling, always full height -->
      <aside class="pw__detail" *ngIf="selectedTask" [@slidePanel]>

        <div class="pw__detail-inner">
          <vex-task-details-panel
            [task]="selectedTask"
            (close)="closeDetail()"
            (taskUpdate)="onTaskUpdate($event)"
            (toggleComplete)="onToggleComplete($event)">
          </vex-task-details-panel>
        </div>

      </aside>

    </div>

  </div>

</ng-container>

<!-- ── Not found ────────────────────────────────────────────────── -->
<ng-template #notFound>
  <div class="pw-empty">
    <mat-icon svgIcon="mat:folder_open" class="pw-empty__icon"></mat-icon>
    <p class="pw-empty__title">Project not found</p>
    <p class="pw-empty__sub">This project doesn't exist or has been removed.</p>
  </div>
</ng-template>
