<div class="project-workspace" *ngIf="project">

  <vex-project-header [project]="project"></vex-project-header>

  <mat-drawer-container class="project-body" autosize>

    <mat-drawer #detailDrawer mode="side" position="end" class="project-detail-drawer">
      <!-- Task detail panel would go here when implemented -->
      <div class="drawer-placeholder" *ngIf="selectedTask">
        <div class="drawer-placeholder__header">
          <button mat-icon-button (click)="closeDetail()">
            <mat-icon>close</mat-icon>
          </button>
        </div>
        <div class="drawer-placeholder__body">
          <h3>{{ selectedTask.name }}</h3>
          <p>{{ selectedTask.description }}</p>
        </div>
      </div>
    </mat-drawer>

    <mat-drawer-content class="project-content">
      <router-outlet></router-outlet>
    </mat-drawer-content>

  </mat-drawer-container>
</div>

<div class="project-empty" *ngIf="!project">
  <mat-icon>folder_open</mat-icon>
  <p>Project not found.</p>
</div>
