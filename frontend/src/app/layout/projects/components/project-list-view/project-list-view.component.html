<div class="list-view">
  <table mat-table [dataSource]="dataSource" class="list-table" matSort>

    <!-- Checkbox column -->
    <ng-container matColumnDef="complete">
      <th mat-header-cell *matHeaderCellDef style="width:48px"></th>
      <td mat-cell *matCellDef="let task">
        <mat-checkbox
          [checked]="task.completed"
          color="primary"
          (click)="toggleComplete(task, $event)">
        </mat-checkbox>
      </td>
    </ng-container>

    <!-- Name column -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Task name</th>
      <td mat-cell *matCellDef="let task"
          class="task-name-cell"
          [class.task-name-cell--done]="task.completed">
        {{ task.name }}
      </td>
    </ng-container>

    <!-- Assignee column -->
    <ng-container matColumnDef="assignee">
      <th mat-header-cell *matHeaderCellDef>Assignee</th>
      <td mat-cell *matCellDef="let task">
        <div class="assignee-cell" *ngIf="task.assignee">
          <img [src]="task.assignee.imgUrl"
               [matTooltip]="task.assignee.name"
               class="avatar avatar--xs">
          <span class="assignee-name">{{ task.assignee.name }}</span>
        </div>
        <span *ngIf="!task.assignee" class="unassigned">—</span>
      </td>
    </ng-container>

    <!-- Due Date column -->
    <ng-container matColumnDef="dueDate">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Due date</th>
      <td mat-cell *matCellDef="let task"
          [class.overdue-cell]="isOverdue(task.dueDate)">
        <span *ngIf="task.dueDate">
          <mat-icon inline class="due-icon">schedule</mat-icon>
          {{ task.dueDate | date:'MMM d' }}
        </span>
        <span *ngIf="!task.dueDate">—</span>
      </td>
    </ng-container>

    <!-- Priority column -->
    <ng-container matColumnDef="priority">
      <th mat-header-cell *matHeaderCellDef>Priority</th>
      <td mat-cell *matCellDef="let task">
        <div class="priority-pill" [style.background]="priorityColor(task.priority) + '20'"
             [style.color]="priorityColor(task.priority)">
          {{ task.priority | titlecase }}
        </div>
      </td>
    </ng-container>

    <!-- Status column -->
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let task">
        <div class="status-pill" [ngClass]="'status-pill--' + task.status">
          {{ task.status | titlecase }}
        </div>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"
        (click)="selectRow(row)"
        [class.row--selected]="selectedTask?.id === row.id"
        class="task-row">
    </tr>

    <tr class="mat-row no-data-row" *matNoDataRow>
      <td class="mat-cell" [attr.colspan]="displayedColumns.length">
        No tasks in this project.
      </td>
    </tr>
  </table>
</div>
