<div class="my-tasks-page">

  <vex-page-header title="My Tasks" [breadcrumbs]="breadcrumbs">
    <vex-task-filters
      [activeFilter]="activeFilter"
      (filterChange)="onFilterChange($event)">
    </vex-task-filters>
  </vex-page-header>

  <mat-drawer-container class="my-tasks-body" autosize>

    <mat-drawer #detailDrawer mode="side" position="end" class="detail-drawer">
      <vex-task-details-panel
        *ngIf="selectedTask"
        [task]="selectedTask"
        (close)="closeDetail()"
        (taskUpdate)="onTaskUpdate($event)"
        (toggleComplete)="onToggleComplete($event)">
      </vex-task-details-panel>
    </mat-drawer>

    <mat-drawer-content class="my-tasks-content">
      <vex-task-sections
        [sections]="sections"
        (taskSelected)="selectTask($event)"
        (toggleComplete)="onToggleComplete($event)">
      </vex-task-sections>
    </mat-drawer-content>

  </mat-drawer-container>
</div>
