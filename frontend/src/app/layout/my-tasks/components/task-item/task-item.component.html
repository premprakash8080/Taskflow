<div class="task-row" [class.task-row--done]="task.completed">

  <!-- Col 1: Name -->
  <div class="task-row__name-col">
    <!-- Priority dot indicator -->
    <div class="task-row__type-dot"
         [style.background]="typeColor(task.priority)">
    </div>

    <!-- Circle checkbox -->
    <button class="task-circle"
            [class.task-circle--done]="task.completed"
            (click)="onCheckboxChange($event)"
            [matTooltip]="task.completed ? 'Mark incomplete' : 'Mark complete'">
      <mat-icon svgIcon="mat:check" *ngIf="task.completed"></mat-icon>
    </button>

    <!-- Task name text -->
    <span class="task-row__name">{{ task.name }}</span>
  </div>

  <!-- Col 2: Due date -->
  <div class="task-row__due"
       [class.task-row__due--overdue]="isOverdue(task.dueDate)"
       [class.task-row__due--today]="isDueToday(task.dueDate)">
    <ng-container *ngIf="task.dueDate">
      {{ task.dueDate | date:'MMM d' }}
    </ng-container>
  </div>

  <!-- Col 3: Assignee -->
  <div class="task-row__assignee">
    <ng-container *ngIf="task.assignee; else noAssignee">
      <img *ngIf="!avatarError"
           [src]="task.assignee.imgUrl"
           [matTooltip]="task.assignee.name"
           class="assignee-avatar"
           (error)="avatarError = true">
      <div *ngIf="avatarError"
           class="assignee-initials"
           [style.background]="projectColor(task.assignee.id)"
           [matTooltip]="task.assignee.name">
        {{ task.assignee.name | slice:0:1 }}
      </div>
    </ng-container>
    <ng-template #noAssignee>
      <span class="assignee-empty">—</span>
    </ng-template>
  </div>

  <!-- Col 4: Project tag -->
  <div class="task-row__project">
    <span class="project-tag" *ngIf="task.projectName"
          [style.background]="projectColor(task.projectId)">
      {{ task.projectName | slice:0:14 }}
    </span>
  </div>

  <!-- Col 5: Priority badge -->
  <div class="task-row__priority">
    <span class="priority-badge" [class]="'priority-badge--' + task.priority">
      {{ task.priority | titlecase }}
    </span>
  </div>

</div>
