<div class="ib-detail">

  <!-- ── HEADER ─────────────────────────────────────────────────────────── -->
  <div class="ib-detail__header">

    <!-- Type pill -->
    <div class="ib-detail__type-pill"
         [style.background]="typeColor(notification.type) + '20'"
         [style.color]="typeColor(notification.type)">
      <mat-icon [svgIcon]="'mat:' + typeIcon(notification.type)"></mat-icon>
      {{ typeLabel(notification.type) }}
    </div>

    <!-- Unread badge -->
    <span class="ib-detail__new-badge" *ngIf="!notification.read">New</span>

    <!-- Spacer -->
    <span style="flex:1"></span>

    <!-- Time -->
    <span class="ib-detail__time">
      {{ notification.createdAt | date:'MMM d, h:mm a' }}
    </span>

    <!-- Close -->
    <button mat-icon-button class="ib-detail__close" (click)="close.emit()" matTooltip="Close">
      <mat-icon svgIcon="mat:close"></mat-icon>
    </button>
  </div>

  <!-- ── BODY ───────────────────────────────────────────────────────────── -->
  <div class="ib-detail__body">

    <!-- Sender row -->
    <div class="ib-detail__sender">
      <img
        *ngIf="!senderImgError"
        [src]="notification.sender.imgUrl"
        class="ib-avatar ib-avatar--md"
        (error)="senderImgError = true">
      <div
        *ngIf="senderImgError"
        class="ib-avatar ib-avatar--initials ib-avatar--md"
        [style.background]="avatarColor(notification.sender.id)">
        {{ initials(notification.sender.name) }}
      </div>
      <div class="ib-detail__sender-info">
        <span class="ib-detail__sender-name">{{ notification.sender.name }}</span>
        <span class="ib-detail__sender-action">{{ notification.title }}</span>
      </div>
    </div>

    <!-- Message -->
    <p class="ib-detail__message">{{ notification.message }}</p>

    <!-- Context: task + project -->
    <div class="ib-detail__context" *ngIf="notification.taskName || notification.projectName">
      <div class="ib-detail__ctx-row" *ngIf="notification.taskName">
        <mat-icon svgIcon="mat:check_circle_outline" class="ib-detail__ctx-icon"></mat-icon>
        <div class="ib-detail__ctx-content">
          <span class="ib-detail__ctx-label">Task</span>
          <span class="ib-detail__ctx-value">{{ notification.taskName }}</span>
        </div>
      </div>
      <div class="ib-detail__ctx-row" *ngIf="notification.projectName">
        <mat-icon svgIcon="mat:folder_open" class="ib-detail__ctx-icon"></mat-icon>
        <div class="ib-detail__ctx-content">
          <span class="ib-detail__ctx-label">Project</span>
          <span class="ib-detail__ctx-value">{{ notification.projectName }}</span>
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="ib-detail__actions">
      <button mat-flat-button color="primary" (click)="goToTask()"
              *ngIf="notification.projectId">
        <mat-icon svgIcon="mat:open_in_new"></mat-icon>
        Open task
      </button>
      <button mat-button class="ib-btn-ghost">
        <mat-icon svgIcon="mat:archive"></mat-icon>
        Archive
      </button>
    </div>

  </div>
</div>
